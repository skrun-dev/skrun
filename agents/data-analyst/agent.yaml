name: dev/data-analyst
version: 1.0.0

model:
  provider: google
  name: gemini-2.5-flash

inputs:
  - name: data
    type: string
    required: true
    description: The data to analyze (CSV or JSON string)
  - name: format
    type: string
    required: true
    description: "Data format: csv or json"
  - name: question
    type: string
    required: false
    description: Specific question to answer about the data

outputs:
  - name: analysis
    type: string
    description: Narrative summary of the data
  - name: insights
    type: array
    description: List of specific, actionable insights
  - name: chart_suggestion
    type: string
    description: Recommended chart type and what to plot

environment:
  networking:
    allowed_hosts: []
  filesystem: read-only
  secrets: []
  timeout: 120s
  sandbox: strict

state:
  type: none
  ttl: 30d

tests:
  - name: csv-analysis
    input:
      data: "month,revenue\nJan,10000\nFeb,12000\nMar,15000"
      format: csv
      question: "What is the revenue trend?"
    assert: output.analysis != ""
