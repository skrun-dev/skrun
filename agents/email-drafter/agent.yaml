name: dev/email-drafter
version: 1.0.0

model:
  provider: google
  name: gemini-2.5-flash
  fallback:
    provider: openai
    name: gpt-4o-mini

inputs:
  - name: context
    type: string
    required: true
    description: What the email is about and why it is being sent
  - name: tone
    type: string
    required: true
    description: "Email tone: formal, casual, or friendly"
  - name: recipient
    type: string
    required: true
    description: Who the email is for (role, relationship)

outputs:
  - name: subject
    type: string
    description: Email subject line
  - name: body
    type: string
    description: Full email body
  - name: call_to_action
    type: string
    description: The specific action for the recipient

environment:
  networking:
    allowed_hosts: []
  filesystem: read-only
  secrets: []
  timeout: 60s
  sandbox: strict

state:
  type: none
  ttl: 30d

tests:
  - name: formal-email
    input:
      context: "Follow up on proposal sent last week"
      tone: formal
      recipient: "VP of Engineering at Acme Corp"
    assert: output.subject != ""
