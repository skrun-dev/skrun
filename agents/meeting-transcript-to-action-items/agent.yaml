name: dev/meeting-transcript-to-action-items
version: 0.2.0

# v0.2.0: audio-native. Accepts a meeting recording directly via Skrun's multimodal-inputs (#56).
# Gemini transcribes the audio internally then extracts decisions + action items in a single pass.
# v0.1.0 (text transcript input) is removed — upstream Whisper / VTT extraction is no longer needed.

model:
  provider: google
  name: gemini-2.5-flash
  fallback:
    provider: google
    name: gemini-2.5-flash-lite

tools:
  - name: write_artifact
    description: Write a Markdown or CSV file to the run's output directory. Use to write `actions.csv` and `recap.md`.
    input_schema:
      type: object
      properties:
        filename:
          type: string
          description: Output filename. Must end in .md or .csv.
        content:
          type: string
          description: Full file content.
      required: [filename, content]
      additionalProperties: false

inputs:
  - name: recording
    type: file
    media: audio
    mime_types: [audio/wav, audio/mpeg, audio/mp3, audio/m4a, audio/ogg, audio/webm]
    max_size: 25000000
    max_count: 1
    required: true
    description: A meeting audio recording. Gemini transcribes it natively — no upstream STT step required. Up to ~30 min for typical compression.
  - name: meeting_date
    type: string
    required: true
    description: Meeting date in ISO format (YYYY-MM-DD).
  - name: meeting_title
    type: string
    required: false
    description: Short meeting title (e.g., "Sprint planning"). Defaults to "Meeting".
  - name: attendees
    type: array
    required: false
    description: List of attendee names. Helps the LLM resolve speaker labels in the recording.

outputs:
  - name: actions_added_count
    type: number
    description: Number of new action items extracted from this recording.
  - name: actions_resolved_count
    type: number
    description: Number of previously-open actions detected as completed in this meeting.
  - name: actions_open_count
    type: number
    description: Total open actions after this run (carryover + new − resolved).
  - name: summary
    type: string
    description: One-paragraph recap suitable for pasting into Slack.

environment:
  networking:
    allowed_hosts: []
  filesystem: read-write
  secrets: []
  timeout: 240s
  sandbox: strict

state:
  type: kv
  ttl: 90d
