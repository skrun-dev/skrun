name: dev/seo-audit
version: 1.0.0

model:
  provider: google
  name: gemini-2.5-flash
  temperature: 0.3
  fallback:
    provider: google
    name: gemini-2.5-flash

inputs:
  - name: website_url
    type: string
    required: true
    description: The website URL to audit

outputs:
  - name: seo_report
    type: object
    description: Detailed SEO audit findings
  - name: score
    type: number
    description: SEO health score 0-100
  - name: previous_score
    type: number
    description: Score from previous audit
  - name: trend
    type: string
    description: "improving, declining, stable, or first_audit"

environment:
  networking:
    allowed_hosts:
      - "*"
  filesystem: read-only
  secrets: []
  timeout: 300s
  max_cost: 0.50
  sandbox: strict

state:
  type: kv
  ttl: 30d

tests:
  - name: basic-audit
    input:
      website_url: "https://example.com"
    assert: output.score >= 0
