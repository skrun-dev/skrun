name: dev/pdf-processing
version: 1.0.0

model:
  provider: google
  name: gemini-2.5-flash

tools:
  - name: extract
    description: Extract text content from a PDF (returns extracted_text, pages, characters)
    input_schema:
      type: object
      properties:
        content:
          type: string
          description: The PDF content or text to extract
      required: [content]
      additionalProperties: false

inputs:
  - name: task
    type: string
    required: true
    description: "The PDF task: extract, summarize, or analyze"
  - name: content
    type: string
    required: true
    description: The PDF content or text to process

outputs:
  - name: result
    type: string
    description: Processed result
  - name: pages
    type: number
    description: Number of pages

permissions:
  network: []
  filesystem: read-only
  secrets: []

runtime:
  timeout: 120s
  sandbox: strict

state:
  type: none
  ttl: 30d

tests:
  - name: extract-text
    input:
      task: extract text
      content: "This is a sample PDF document with important information."
    assert: output.pages >= 1
